<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Analyzing {{ domain }} — DENZO SEO</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #080808;
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Grid overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(99,102,241,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Radial glow */
    .glow {
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(ellipse, rgba(99,102,241,.12) 0%, transparent 65%);
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 480px;
      padding: 32px 24px;
    }

    /* Spinning logo */
    .spinner-wrap {
      position: relative;
      width: 80px;
      height: 80px;
      margin: 0 auto 32px;
    }
    .spinner-ring {
      position: absolute;
      inset: 0;
      border: 2px solid transparent;
      border-top-color: #6366f1;
      border-right-color: #6366f1;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    .spinner-ring-2 {
      inset: 8px;
      border-top-color: #a855f7;
      border-right-color: transparent;
      animation: spin 1.5s linear infinite reverse;
    }
    .spinner-core {
      position: absolute;
      inset: 20px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .domain-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 24px;
    }
    .domain-badge strong { color: #fff; }

    .headline {
      font-size: 28px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 8px;
      letter-spacing: -.02em;
    }
    .subline {
      font-size: 15px;
      color: #6b7280;
      margin-bottom: 40px;
    }

    /* Progress bar */
    .progress-track {
      background: #1a1a1a;
      border-radius: 100px;
      height: 6px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #6366f1, #a855f7);
      border-radius: 100px;
      transition: width .4s ease;
      width: 0%;
    }

    /* Steps list */
    .steps { text-align: left; display: flex; flex-direction: column; gap: 12px; }
    .step-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: #0e0e0e;
      border: 1px solid #1e1e1e;
      border-radius: 10px;
      font-size: 14px;
      color: #6b7280;
      transition: all .3s;
    }
    .step-item.active {
      border-color: rgba(99,102,241,.4);
      color: #e5e7eb;
      background: rgba(99,102,241,.06);
    }
    .step-item.done {
      border-color: rgba(34,197,94,.3);
      color: #86efac;
      background: rgba(34,197,94,.05);
    }

    .step-icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      background: #1a1a1a;
      transition: all .3s;
    }
    .step-item.active .step-icon {
      background: rgba(99,102,241,.2);
      animation: pulse 1.5s ease-in-out infinite;
    }
    .step-item.done .step-icon { background: rgba(34,197,94,.2); }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .5; }
    }
  </style>
</head>
<body>
<div class="glow"></div>

<div class="container">
  <div class="spinner-wrap">
    <div class="spinner-ring"></div>
    <div class="spinner-ring spinner-ring-2"></div>
    <div class="spinner-core">
      <svg width="20" height="20" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
      </svg>
    </div>
  </div>

  <div class="domain-badge">
    <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9"/>
    </svg>
    Analyzing <strong>{{ domain }}</strong>
  </div>

  <h1 class="headline">Running your free audit…</h1>
  <p class="subline">Our AI is scanning your site. This takes about 10 seconds.</p>

  <div class="progress-track">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="steps" id="stepsList">
    <div class="step-item" id="s0">
      <div class="step-icon">🌐</div>
      <span>Fetching your website</span>
    </div>
    <div class="step-item" id="s1">
      <div class="step-icon">🔍</div>
      <span>Analyzing on-page SEO signals</span>
    </div>
    <div class="step-item" id="s2">
      <div class="step-icon">🏢</div>
      <span>Detecting your business information</span>
    </div>
    <div class="step-item" id="s3">
      <div class="step-icon">⚔️</div>
      <span>Identifying competitors</span>
    </div>
    <div class="step-item" id="s4">
      <div class="step-icon">🎯</div>
      <span>Finding keyword opportunities</span>
    </div>
  </div>
</div>

<script>
  const steps = [
    { id: 's0', pct: 20,  delay: 400  },
    { id: 's1', pct: 45,  delay: 1200 },
    { id: 's2', pct: 65,  delay: 2200 },
    { id: 's3', pct: 82,  delay: 3200 },
    { id: 's4', pct: 100, delay: 4200 },
  ];

  const fill = document.getElementById('progressFill');

  steps.forEach((s, i) => {
    // Activate
    setTimeout(() => {
      if (i > 0) {
        document.getElementById(steps[i-1].id).classList.remove('active');
        document.getElementById(steps[i-1].id).classList.add('done');
        document.getElementById(steps[i-1].id).querySelector('.step-icon').textContent = '✓';
      }
      document.getElementById(s.id).classList.add('active');
      fill.style.width = s.pct + '%';
    }, s.delay);
  });

  // Redirect after all steps done
  setTimeout(() => {
    // Mark last step done
    document.getElementById('s4').classList.remove('active');
    document.getElementById('s4').classList.add('done');
    document.getElementById('s4').querySelector('.step-icon').textContent = '✓';
    fill.style.width = '100%';
    // Navigate to step 1
    setTimeout(() => {
      window.location.href = '/wizard/step/1';
    }, 600);
  }, 5000);
</script>
</body>
</html>
