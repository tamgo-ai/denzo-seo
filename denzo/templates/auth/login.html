<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — DENZO SEO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow: hidden;
    }

    /* Ambient glow */
    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(249,115,22,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .wrapper {
      width: 100%;
      max-width: 380px;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 40px;
    }
    .logo-area img {
      height: 36px;
      width: auto;
      object-fit: contain;
      display: inline-block;
    }

    .card {
      background: #0e0e0e;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 32px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 24px;
      letter-spacing: -0.02em;
    }

    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: #666;
      margin-bottom: 7px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .form-input {
      width: 100%;
      background: #000;
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus { border-color: #f97316; }
    .form-input::placeholder { color: #333; }

    .btn {
      width: 100%;
      background: #f97316;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: -0.01em;
      margin-top: 8px;
      transition: background 0.15s, transform 0.1s;
    }
    .btn:hover { background: #ea6b0a; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .error-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      color: #f87171;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 20px;
      font-size: 13px;
    }

    .footer-text {
      text-align: center;
      font-size: 11px;
      color: #333;
      margin-top: 28px;
    }

    /* Grid overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="logo-area">
      <img src="https://denzostudiospro.com/logo%20ofi.png" alt="Denzo" />
    </div>

    <div class="card">
      <p class="card-title">Sign in to your account</p>

      {% if error %}
      <div class="error-box">
        <svg style="width:14px;height:14px;flex-shrink:0" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
        </svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input class="form-input" id="username" name="username" type="text"
                 autocomplete="username" required autofocus placeholder="denzo">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" id="password" name="password" type="password"
                 autocomplete="current-password" required placeholder="••••••••">
        </div>
        <button class="btn" type="submit">Sign In →</button>
      </form>
    </div>

    <p class="footer-text">&copy; 2026 Denzo Studios</p>
  </div>
</body>
</html>
