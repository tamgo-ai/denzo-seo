<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ audit.page_title or audit.domain }} — SEO Audit Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#08090b;--surface:#111318;--surface2:#1a1d24;--border:rgba(255,255,255,0.06);--text:#edf0f5;--muted:#7b8290;--accent:#6366f1;--green:#22c55e;--orange:#f59e0b;--red:#ef4444;}
html,body{height:100%}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;min-height:100vh;}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

.toolbar{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;border-bottom:1px solid var(--border);backdrop-filter:blur(12px);background:rgba(8,9,11,0.8);position:sticky;top:0;z-index:10;flex-wrap:wrap;gap:0.75rem;}
.toolbar-brand{display:flex;align-items:center;gap:0.6rem;font-weight:700;font-size:1rem;letter-spacing:-0.01em;}
.toolbar-brand .dot{width:8px;height:8px;background:var(--accent);border-radius:50%;box-shadow:0 0 8px rgba(99,102,241,0.25);}
.toolbar-actions{display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center;}
.btn-dl{padding:0.45rem 1rem;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:0.8rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.2s;}
.btn-dl:hover{background:#5558e6;}
.btn-ghost{padding:0.45rem 1rem;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;font-size:0.8rem;cursor:pointer;font-family:inherit;transition:all 0.2s;}
.btn-ghost:hover{border-color:var(--accent);color:var(--text);}
.compare-select{padding:0.4rem 0.75rem;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;font-size:0.8rem;font-family:inherit;}
.compare-select option{background:var(--surface);}
.tool-footer{margin-top:auto;padding:1.5rem 2rem;text-align:center;border-top:1px solid var(--border);font-size:0.75rem;color:var(--muted);}
.report-wrap{max-width:960px;margin:0 auto;padding:1.5rem;width:100%;}
</style>
</head>
<body>

<header class="toolbar">
  <div class="toolbar-brand"><span class="dot"></span> DENZO Site Auditor</div>
  <div class="toolbar-actions">
    {% if previous_audits %}
    <select class="compare-select" id="compare-select" onchange="compareWith(this.value)">
      <option value="">Compare with...</option>
      {% for p in previous_audits %}
      <option value="{{ p.audit_id }}">{{ p.created_at[:10] }} ({{ p.overall_score }}/100)</option>
      {% endfor %}
    </select>
    {% endif %}
    <a href="/auditor/report/{{ audit.audit_id }}/download" class="btn-dl">⬇ Download HTML</a>
    <a href="/auditor/" class="btn-ghost">← New Audit</a>
  </div>
</header>

<main class="report-wrap">
  {{ audit.report_html | safe }}
</main>

<footer class="tool-footer">
  <p>Generated by DENZO Site Auditor · <a href="/auditor/">auditor</a> · <a href="/auditor/history">history</a></p>
</footer>

<script>
function compareWith(id) { if (id) window.location.href = '/auditor/compare/{{ audit.audit_id }}/' + id; }
</script>
</body>
</html>
